name: Build NearDropAuto

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Полностью вырезаем любые упоминания подписи и команд разработчика из файла проекта
    - name: Disable Code Signing in Project
      run: |
        sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer";/CODE_SIGN_IDENTITY = "";/g' NearDrop.xcodeproj/project.pbxproj || true
        sed -i '' 's/DEVELOPMENT_TEAM = .*;//g' NearDrop.xcodeproj/project.pbxproj || true
        sed -i '' 's/CODE_SIGNING_REQUIRED = YES;/CODE_SIGNING_REQUIRED = NO;/g' NearDrop.xcodeproj/project.pbxproj || true

    # Собираем проект через стандартный 'build', но переопределяем папки Xcode через OBJROOT и SYMROOT
    - name: Build App
      run: |
        xcodebuild clean build \
          -project NearDrop.xcodeproj \
          -scheme NearDrop \
          -configuration Release \
          OBJROOT=$GITHUB_WORKSPACE/build/obj \
          SYMROOT=$GITHUB_WORKSPACE/build/sym \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          COMPILER_INDEX_STORE_ENABLE=NO

    # Копируем готовое приложение в чистую папку перед отправкой
    - name: Prepare Artifact
      run: |
        mkdir -p ./dist
        cp -R $GITHUB_WORKSPACE/build/sym/Release/NearDrop.app ./dist/NearDrop.app

    # Выгружаем готовый артефакт
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NearDropAuto-App
        path: ./dist/NearDrop.app
