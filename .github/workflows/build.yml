name: NearDropAuto

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch: # Позволяет запускать сборку вручную

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Принудительно отключаем подпись в самом файле проекта, чтобы избежать ошибок Xcode
    - name: Disable Code Signing in Project
      run: |
        sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer";/CODE_SIGN_IDENTITY = "";/g' NearDrop.xcodeproj/project.pbxproj || true
        sed -i '' 's/DEVELOPMENT_TEAM = .*;//g' NearDrop.xcodeproj/project.pbxproj || true

    # Сборка проекта без требования сертификатов Apple Developer
    - name: Build App
      run: |
        xcodebuild clean build \
          -project NearDrop.xcodeproj \
          -scheme NearDrop \
          -configuration Release \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          COMPILER_INDEX_STORE_ENABLE=NO

    # Архивируем готовое приложение (.app), чтобы его можно было скачать из GitHub Actions
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NearDropAuto-App
        path: build/Release/NearDrop.app
