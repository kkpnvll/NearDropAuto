name: Build NearDropAuto

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Очищаем настройки подписи в проекте
    - name: Disable Code Signing in Project
      run: |
        sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer";/CODE_SIGN_IDENTITY = "";/g' NearDrop.xcodeproj/project.pbxproj || true
        sed -i '' 's/DEVELOPMENT_TEAM = .*;//g' NearDrop.xcodeproj/project.pbxproj || true
        sed -i '' 's/CODE_SIGNING_REQUIRED = YES;/CODE_SIGNING_REQUIRED = NO;/g' NearDrop.xcodeproj/project.pbxproj || true

    # Сборка проекта с выводом ошибок в отдельный файл для диагностики
    - name: Build App
      run: |
        xcodebuild clean build \
          -project NearDrop.xcodeproj \
          -scheme NearDrop \
          -configuration Release \
          OBJROOT=$GITHUB_WORKSPACE/build/obj \
          SYMROOT=$GITHUB_WORKSPACE/build/sym \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          COMPILER_INDEX_STORE_ENABLE=NO > xcode_build.log 2>&1 || true

    # Выводим в лог GitHub Actions только строки с ошибками компиляции
    - name: Diagnose Errors
      run: |
        echo "=== КРИТИЧЕСКИЕ ОШИБКИ СБОРКИ XCODE ==="
        grep -E "error:|failed|Could not" xcode_build.log || tail -n 30 xcode_build.log
        
        # Если папка приложения всё же создалась, мы её запишем, иначе прервем сборку честно
        FOUND_PATH=$(find . -name "NearDrop.app" -type d | head -n 1)
        if [ -z "$FOUND_PATH" ]; then
          echo "Сборка не удалась. Изучите ошибки выше."
          exit 1
        fi
        echo "app_path=$FOUND_PATH" >> $GITHUB_OUTPUT
