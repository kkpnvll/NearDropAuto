name: NearDropAuto

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Отключаем подпись в метаданных проекта
    - name: Disable Code Signing in Project
      run: |
        sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer";/CODE_SIGN_IDENTITY = "";/g' NearDrop.xcodeproj/project.pbxproj || true
        sed -i '' 's/DEVELOPMENT_TEAM = .*;//g' NearDrop.xcodeproj/project.pbxproj || true

    # Создаем Xcode-архив в локальную папку проекта
    - name: Archive App
      run: |
        xcodebuild archive \
          -project NearDrop.xcodeproj \
          -scheme NearDrop \
          -configuration Release \
          -archivePath ./build/NearDrop.xcarchive \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          COMPILER_INDEX_STORE_ENABLE=NO

    # Достаем готовое приложение .app из структуры архива
    - name: Extract App From Archive
      run: |
        mkdir -p ./dist
        cp -R ./build/NearDrop.xcarchive/Products/Applications/NearDrop.app ./dist/NearDrop.app

    # Выгружаем готовое приложение
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NearDropAuto-App
        path: ./dist/NearDrop.app
