name: Build NearDropAuto

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Отключаем подпись в метаданных проекта
    - name: Disable Code Signing in Project
      run: |
        sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer";/CODE_SIGN_IDENTITY = "";/g' NearDrop.xcodeproj/project.pbxproj || true
        sed -i '' 's/DEVELOPMENT_TEAM = .*;//g' NearDrop.xcodeproj/project.pbxproj || true
        sed -i '' 's/CODE_SIGNING_REQUIRED = YES;/CODE_SIGNING_REQUIRED = NO;/g' NearDrop.xcodeproj/project.pbxproj || true

    # Сборка проекта (Успешно работает)
    - name: Build App
      run: |
        xcodebuild clean build \
          -project NearDrop.xcodeproj \
          -scheme NearDrop \
          -configuration Release \
          OBJROOT=$GITHUB_WORKSPACE/build/obj \
          SYMROOT=$GITHUB_WORKSPACE/build/sym \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          COMPILER_INDEX_STORE_ENABLE=NO

    # Архивируем приложение через родной утилитный zip macOS, чтобы сохранить структуру пакета
    - name: Package App into ZIP
      run: |
        mkdir -p ./dist
        cd $GITHUB_WORKSPACE/build/sym/Release/
        zip -r -y $GITHUB_WORKSPACE/dist/QuickShare.zip QuickShare.app

    # Выгружаем готовый, защищенный ZIP-архив
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: QuickShare-Mac-App
        path: ./dist/QuickShare.zip
